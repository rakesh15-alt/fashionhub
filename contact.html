<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <style>*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:#efe6d8;
  
  background:
  linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),
  url('images/bg5.jpeg');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  color:white;

  min-height:100vh;
}

header{
  display:flex;
  align-items:center;
  gap:15px;
  padding:15px 8%;
  background:#111;
  color:white;
}

.back{
  text-decoration:none;
  color:#ffb703;
  font-size:18px;
}

.contact-wrapper{
  min-height:100vh;
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:40px;
  padding:60px 8%;
}

/* Owner Card */

.owner-card{
  position:relative;
  border-radius:25px;
  overflow:hidden;
  min-height:500px;
}

.owner-card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.85), rgba(0,0,0,.2));
  color:white;
  padding:40px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}

.overlay h1{
  font-size:2.8rem;
}

.overlay h3{
  font-weight:400;
  opacity:.9;
}

.overlay p{
  margin:10px 0 15px;
  font-style:italic;
}

.contact-info span{
  display:block;
  margin-top:6px;
}

/* Form */

.form-card{
  background:white;
  padding:35px;
  border-radius:25px;
}

.form-card h2{
  margin-bottom:20px;
}

form input, form textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
  margin-bottom:15px;
}

form textarea{
  resize:none;
  height:130px;
}

form button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:black;
  color:white;
  font-size:16px;
  cursor:pointer;
  box-shadow:0 0 12px #ffb703;
  transition:.3s;
}

form button:hover{
  box-shadow:0 0 25px #ffb703;
  transform:scale(1.03);
}

/* Responsive */

@media(max-width:900px){
  .contact-wrapper{
    grid-template-columns:1fr;
  }

  .owner-card{
    min-height:350px;
  }

  .overlay h1{
    font-size:2rem;
  }
}</style>
</head>
<body>

<header>
  <a href="index.html" class="back">← Back</a>
  <h2>Contact Us</h2>
</header>

<section class="contact-wrapper">

  <div class="owner-card">
    <img src="images/owner.jpeg" alt="Owner">

    <div class="overlay">
      <h1>SANJU</h1>
      <h3>Founder OF fashionHub</h3>
      <p>"Life is all about slaying"</p>
      <div class="contact-info">
       <a href="tel:+918554819188"></a><span>📞 +918554819188</span></a>
      <a href="mailto:sanjivineemurke@gmail.com"><span>sanjivineemurke@gmail.com</span></a>
        <span>📍 Nagpur,DELHI</span>
      </div>
    </div>

  </div>

</section>

</body>
</html>
