<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#efe6d8;
background:
linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),
url('images/bg5.jpeg');
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
min-height:100vh;
}

header{
display:flex;
align-items:center;
gap:15px;
padding:15px 8%;
background:#111;
}

.back{
text-decoration:none;
color:#ffb703;
font-size:18px;
}

.contact-wrapper{
min-height:100vh;
display:grid;
grid-template-columns:1.2fr 1fr;
gap:40px;
padding:60px 8%;
}

.owner-card{
position:relative;
border-radius:25px;
overflow:hidden;
min-height:500px;
}

.owner-card img{
width:100%;
height:100%;
object-fit:cover;
}

.form-card{
background:rgba(255,255,255,.95);
color:#111;
padding:35px;
border-radius:25px;
display:flex;
flex-direction:column;
justify-content:center;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.form-card textarea{
width:100%;
height:180px;
padding:15px;
border-radius:15px;
border:1px solid #ccc;
resize:none;
font-size:16px;
margin-bottom:20px;
}

.form-card button{
padding:14px;
border:none;
border-radius:30px;
background:#111;
color:#fff;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.form-card button:hover{
background:#ffb703;
color:#111;
transform:translateY(-2px);
box-shadow:0 0 20px #ffb703;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,.85), rgba(0,0,0,.2));
padding:40px;
display:flex;
flex-direction:column;
justify-content:flex-end;
}

.overlay h1{
font-size:2.8rem;
}

.overlay h3{
font-weight:400;
opacity:.9;
}

.overlay p{
margin:10px 0 20px;
font-style:italic;
}

/* Contact Icons */

.contact-icons{
display:flex;
gap:20px;
margin-top:15px;
}

.contact-icons a{
width:60px;
height:60px;
display:flex;
justify-content:center;
align-items:center;
border-radius:50%;
background:rgba(255,255,255,.12);
color:white;
font-size:28px;
text-decoration:none;
transition:.35s;
backdrop-filter:blur(10px);
}

.contact-icons a:hover{
transform:translateY(-5px) scale(1.12);
box-shadow:0 0 20px #ffb703;
background:#ffb703;
color:black;
}

/* FAQ */

.faq-box{
margin-top:30px;
}

.faq-box h3{
margin-bottom:12px;
font-size:20px;
}

.faq-box textarea{
width:100%;
height:110px;
padding:14px;
border:none;
outline:none;
border-radius:15px;
resize:none;
font-size:15px;
}

.faq-box button{
margin-top:15px;
padding:12px 30px;
border:none;
border-radius:30px;
background:#ffb703;
color:black;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.faq-box button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #ffb703;
}

#success{
display:none;
margin-top:15px;
color:#7CFC00;
font-weight:bold;
font-size:17px;
}

@media(max-width:900px){

.contact-wrapper{
grid-template-columns:1fr;
}

.owner-card{
min-height:450px;
}

.overlay h1{
font-size:2rem;
}

.contact-icons{
justify-content:center;
}

}

@media(max-width:900px){

.contact-wrapper{
grid-template-columns:1fr;
gap:30px;
padding:30px 20px;
}

.owner-card{
min-height:500px;
}

.overlay{
padding:25px;
}

.overlay h2{
font-size:28px;
}

.form-card{
padding:25px;
}

.contact-icons{
justify-content:flex-start;
}

}
</style>
</head>

<body>

<header>
<a href="index.html" class="back">← Back</a>
<h2>Contact Us</h2>
</header>

<section class="contact-wrapper">

<div class="owner-card">

<img src="images/owner.jpeg" alt="Owner">

<div class="overlay">

<h2>SANJIVANEE MURKE</h2>

<h3>Founder Of FashionHub</h3>

<p>📍 Nagpur, Maharashtra</p>

<p>"Life is all about slaying."</p>

<div class="contact-icons">

<a href="https://wa.me/918554819188" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<a href="mailto:sanjivineemurke@gmail.com">
<i class="fas fa-envelope"></i>
</a>

</div>

</div>

</div>

<div class="form-card">

<h2>Ask Your Question</h2>

<p style="color:#666;margin-bottom:15px;">
We'll review your question soon.
</p>

<textarea id="faq" placeholder="Write your question here..."></textarea>

<button onclick="submitFAQ()">Submit FAQ</button>

<div id="success">
✅ Your FAQ has been submitted!
</div>

</div>

</section>
<script>

function submitFAQ(){

let text=document.getElementById("faq");

if(text.value.trim()==""){
alert("Please write your question.");
return;
}

document.getElementById("success").style.display="block";

text.value="";

setTimeout(()=>{
document.getElementById("success").style.display="none";
},3000);

}

</script>

</body>
</html>
